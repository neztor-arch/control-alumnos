<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Alumnos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-screen" id="loginScreen">
        <div class="card">
            <h1>Control de Alumnos</h1>
            <p>Inicia sesión para administrar el sistema escolar.</p>
            <form id="formLogin" class="login-form">
                <input type="text" id="usuario" placeholder="Usuario" required>
                <input type="password" id="contraseña" placeholder="Contraseña" required>
                <button id="btnEntrar" type="submit">Iniciar sesión</button>
            </form>
            <p class="hint">Usuario demo: admin / Contraseña: 1234</p>
        </div>
    </div>

    <div class="app-shell hidden" id="appShell">
        <header class="topbar">
            <div>
                <p class="eyebrow">Panel principal</p>
                <h2>Gestión de alumnos</h2>
            </div>
            <button id="btnSalir" class="secondary-btn" type="button">Cerrar sesión</button>
        </header>

        <section class="stats">
            <article class="stat-card">
                <h3 id="totalAlumnos">0</h3>
                <p>Total alumnos</p>
            </article>
            <article class="stat-card">
                <h3 id="aprobados">0</h3>
                <p>Aprobados</p>
            </article>
            <article class="stat-card">
                <h3 id="promedio">0.0</h3>
                <p>Promedio</p>
            </article>
        </section>

        <section class="dashboard">
            <form id="formAlumno" class="panel">
                <h3 id="formTitle">Agregar alumno</h3>
                <input type="hidden" id="alumnoId">
                <label>
                    Nombre
                    <input type="text" id="nombre" required>
                </label>
                <label>
                    Curso
                    <input type="text" id="curso" required>
                </label>
                <label>
                    Calificación
                    <input type="number" id="calificacion" min="0" max="10" step="0.1" required>
                </label>
                <label>
                    Estado
                    <select id="estado">
                        <option value="Activo">Activo</option>
                        <option value="Inactivo">Inactivo</option>
                    </select>
                </label>
                <button type="submit" class="primary-btn">Guardar alumno</button>
                <button type="button" id="btnCancelar" class="secondary-btn hidden">Cancelar</button>
            </form>

            <div class="panel">
                <div class="panel-head">
                    <h3>Alumnos registrados</h3>
                    <p id="listaInfo">0 registros</p>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Curso</th>
                                <th>Calificación</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="listaAlumnos"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
